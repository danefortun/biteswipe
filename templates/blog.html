{% extends "base.html" %}

{% block content %}
<style>

</style>
<div style="max-width: 600px; margin: auto; padding: 20px; height: 100vh;">

    <h1>Messages</h1>

    <!-- Messages list -->
    <ul style="list-style: none; padding: 0; margin-bottom: 20px;">
        <div id="posts"></div>
    </ul>

    <!-- Message form -->
    <form method="POST" style="display: flex; flex-direction: column; gap: 10px;">
        <input type="hidden" name="action" value="send">
        <textarea name="message"
        placeholder="Type your message here..."
        style="padding: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
        resize: vertical;
        min-height: 80px;
        max-width:fit-content;
        max-height: fit-content;"></textarea>
        <input type="submit" value="Send" style="padding: 10px; border-radius: 5px; border: none; background-color: #007bff; color: white; cursor: pointer;">
    </form>

</div>


<script>
function loadPosts() {
    fetch("/get_posts")
        .then(response => response.json())
        .then(data => {
            const postsDiv = document.getElementById("posts");
            postsDiv.innerHTML = "";

            data.posts.forEach(post => {
                postsDiv.innerHTML += `
                    <div style="margin-bottom: 20px;">
                        <p>${post.user_id}: ${post.message}</p>
                        
                    </div>
                `;
            });
        });
}

// Load immediately
loadPosts();

// Refresh posts every 3 seconds
setInterval(loadPosts, 3000);
</script>

{% endblock %}
