{% extends "base.html"%}

{%block content%}
<div class="entirebody">
    <h1> Profile </h1>
    <form method="POST">
    <input type="hidden" name="action" value="update_name">
    <textarea name="name"
     minlength="4"
     maxlength="16"
     required
    style="
    max-width:fit-content;
    max-height: 4vh;
    min-width: 5vh; min-height:fit-content;">
    {{ u.name or '' }}</textarea>
    <br>
    <input type="submit" value="Update Name">
</form>

<!--- HTML Structure for Changing Profile Picture --->
<div class="ppic-con" id="ppic-con">

    <img src="{{ url_for('static', filename='uploads/'+u.pfp_file_path) }}" id="ppic"
   
    class ="ppic" border="1"
    width="250px" height="250px" alt="Profile Picture"> 

    <div class="upload-icon">

    <span></span>
    </div>
</div>  
<br>

<form method="POST" enctype="multipart/form-data">
    <input type="hidden" name="action" value="upload_pic">
    <input type="file" name="image">
    <button type="submit">Upload</button>
</form>
<br>

    <hr>

    <p style="text-align:center;">
    <strong> To do list for Verification: </strong>
    </p>
        <ul style="text-align:start; margin-left:20%; padding-top: 5px;" class="ulred">
            <li style="padding-bottom: 15px;">
                Verify .edu email
            </li>

            <li style="padding-bottom: 15px;">
                2FA with your phone number
            </li>

            <li style="padding-bottom: 15px;">
                Create a username
            </li>

            <li>
                xxx
            </li>
        </ul>
    <hr>


    <!--- Biography Section --->
    <h3> About me </h3>
    <form method="POST">
    <input type="hidden" name="action" value="update_bio">
    <textarea name="bio" style="max-width: fit-content; min-height: 5vh;">{{ u.bio or '' }}</textarea>
    <br>
    <input type="submit" value="Update Bio">
</form>
    <hr>

    <h3> Interests </h3>
    <ol style="list-style-type: none; padding-left: 0;">
    {% for interest in interests %}
        <li>{{ interest }}</li>
    {% endfor %}
</ol>
    </div>
{%endblock%}
