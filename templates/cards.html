{%extends "base.html"%}
{%block content%}

<style>

 .main {
  padding-top: 20px;
 }
  
</style>

<script>
    function get_restaurant(){
        fetch('/get_restaurant')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById("cards");
            container.innerHTML = "";

            data.places.forEach(result => {
                console.log(result);

const card = document.createElement("div");  
card.classList.add("card");

// Image
const img = document.createElement("img");
img.src = result.photo;
img.style.width = "100%";
img.style.height = "auto";   // keeps aspect ratio
card.appendChild(img);

// Name
const txt = document.createElement("p");
txt.textContent = result.name['text'];  // bracket notation for dictionary
txt.style.textAlign = "center";         // optional styling
card.appendChild(txt);

// Append card to container
container.appendChild(card);
            });
        });
    }
</script>

<div class="card-container">
    
      <div class="cards" id="cards">
        
      </div>
      <div class="arrow left" onclick="swipeLeft()" style="color: black;">X</div>
      <div class="arrow right" onclick="swipeRight()" style="color: black;">✓</div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
{%endblock%}
